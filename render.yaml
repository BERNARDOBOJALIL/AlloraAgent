services:
  - type: web
    name: allora-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "false"
      - key: LANGSMITH_PROJECT
        value: allora-profile-agent